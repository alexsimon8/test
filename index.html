<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CSA Tutor — ServiceNow</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;background:#f0f2f5;color:#1a1a2e;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}

/* ── Shell ────────────────────────────────────────────────────── */
#app{max-width:680px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.screen{padding:20px 16px 40px;flex:1}

/* ── HOME ─────────────────────────────────────────────────────── */
.home{padding-top:28px}
.home-logo{font-size:22px;font-weight:700;color:#293462;text-align:center}
.home-sub{font-size:13px;color:#666;text-align:center;margin:4px 0 16px}

.global-bar{height:8px;background:#e8eaf0;border-radius:4px;overflow:hidden;display:flex;margin-bottom:6px}
.bar-mastered{background:#2d9e5f;height:100%;transition:width .5s}
.bar-relearned{background:#e8a20a;height:100%;transition:width .5s}
.bar-wrong{background:#e03e3e;height:100%;transition:width .5s}

.bar-legend{display:flex;gap:12px;justify-content:center;font-size:12px;margin-bottom:18px;flex-wrap:wrap}
.legend-mastered{color:#1a6e41;font-weight:600}
.legend-relearned{color:#9a6100;font-weight:600}
.legend-wrong{color:#c0392b;font-weight:600}
.legend-unseen{color:#999}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.menu-card{background:#f7f8fc;border:1.5px solid #e0e4f0;border-radius:14px;
  padding:16px 12px 14px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;user-select:none}
.menu-card:hover{border-color:#4361ee;box-shadow:0 2px 12px rgba(67,97,238,.12)}
.menu-card:active{transform:scale(.97)}
.menu-card.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.card-icon{font-size:22px;margin-bottom:6px}
.card-title{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:2px}
.card-desc{font-size:11px;color:#888;line-height:1.4}

.btn-continue{width:100%;background:#4361ee;color:#fff;border-radius:12px;
  padding:13px;font-size:14px;font-weight:600;margin-bottom:12px;transition:background .15s}
.btn-continue:hover{background:#3451d1}

.home-stats{display:flex;justify-content:center;gap:18px;font-size:13px;color:#555;margin-bottom:14px}

.btn-link{display:block;width:100%;text-align:center;font-size:12px;color:#aaa;
  padding:6px;text-decoration:underline}
.btn-link:hover{color:#e03e3e}
.btn-link-danger{color:#e03e3e;margin-bottom:12px}
.btn-link-danger:hover{color:#a00}

/* ── RANGE / GOTO / EXAM SETUP ────────────────────────────────── */
.screen-title{font-size:20px;font-weight:700;color:#293462;margin-bottom:6px}
.screen-desc{font-size:13px;color:#777;margin-bottom:20px}
.range-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px}
.range-field{display:flex;flex-direction:column;flex:1}
.range-label{font-size:12px;color:#777;margin-bottom:4px;font-weight:600}
.range-sep{font-size:18px;color:#aaa;padding-bottom:8px}
.range-count{font-size:13px;color:#4361ee;font-weight:600;text-align:center;margin-bottom:12px}
.range-shuffle-row{display:flex;align-items:center;gap:8px;font-size:14px;color:#444;margin-bottom:16px}
.range-shuffle-row input{width:16px;height:16px;cursor:pointer}
.goto-input-wrap{margin-bottom:14px}
.goto-input,.exam-input{width:100%;padding:12px 14px;font-size:20px;border:2px solid #dce0f0;
  border-radius:10px;outline:none;color:#1a1a2e;transition:border-color .15s;text-align:center}
.goto-input:focus,.exam-input:focus{border-color:#4361ee}
.goto-input.error{border-color:#e03e3e}
.exam-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.exam-label{font-size:14px;color:#444;white-space:nowrap}
.exam-input{width:120px;font-size:18px;text-align:center}

/* ── SHARED BUTTONS ───────────────────────────────────────────── */
.btn-primary{display:block;width:100%;background:#4361ee;color:#fff;border-radius:12px;
  padding:13px;font-size:14px;font-weight:600;margin-bottom:10px;transition:background .15s,opacity .15s}
.btn-primary:hover:not(:disabled){background:#3451d1}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{display:block;width:100%;background:#f0f2f8;color:#444;border-radius:12px;
  padding:12px;font-size:14px;font-weight:500;margin-bottom:10px;transition:background .15s}
.btn-secondary:hover{background:#e4e8f5}

/* ── QUESTION SCREEN ──────────────────────────────────────────── */
.question-screen{padding:12px 14px 36px}
.q-topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.btn-home{font-size:18px;padding:4px 8px;color:#555;flex-shrink:0}
.q-progress-wrap{flex:1}
.q-progress-bar{height:5px;background:#e8eaf0;border-radius:3px;overflow:hidden;margin-bottom:3px}
.q-progress-fill{height:100%;background:linear-gradient(90deg,#4361ee,#7b2d8b);border-radius:3px;transition:width .4s}
.q-progress-label{font-size:11px;color:#999;text-align:right}
.q-score-chip{font-size:12px;font-weight:600;background:#f0f2f8;border-radius:20px;
  padding:4px 10px;color:#444;white-space:nowrap;flex-shrink:0}
.q-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.q-num{font-size:12px;font-weight:700;color:#4361ee}
.q-topic{font-size:11px;background:#eef0fc;color:#4361ee;border-radius:20px;padding:2px 8px;font-weight:500}
.q-multi{font-size:11px;background:#fff4e0;color:#c97b00;border-radius:20px;padding:2px 8px;font-weight:600}
.q-exam-badge{font-size:11px;background:#ffeaea;color:#c0392b;border-radius:20px;padding:2px 8px;font-weight:700}
.q-state-badge{font-size:11px;border-radius:20px;padding:2px 8px;font-weight:600}
.state-wrong{background:#ffeaea;color:#c0392b}
.state-relearned{background:#fff8e1;color:#9a6100}
.state-mastered{background:#eaf8f0;color:#1a6e41}
.state-unseen{background:#f0f2f8;color:#888}
.state-transition-badge{font-size:13px;font-weight:700;margin-left:4px}
.q-text{font-size:15px;font-weight:600;line-height:1.55;color:#1a1a2e;margin-bottom:16px}
.q-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;
  border:1.5px solid #dce0f0;border-radius:10px;cursor:pointer;
  transition:border-color .12s,background .12s;user-select:none}
.q-opt:hover{border-color:#4361ee;background:#f5f6ff}
.q-opt.selected{border-color:#4361ee;background:#eef0fc}
.q-opt.correct{border-color:#2d9e5f;background:#eaf8f0}
.q-opt.wrong{border-color:#e03e3e;background:#fff0f0}
.opt-letter{font-size:12px;font-weight:700;min-width:20px;color:#888;padding-top:1px;flex-shrink:0}
.q-opt.selected .opt-letter{color:#4361ee}
.q-opt.correct .opt-letter{color:#2d9e5f}
.q-opt.wrong .opt-letter{color:#e03e3e}
.opt-text{font-size:13px;color:#1a1a2e;line-height:1.45}
.hints-wrap{margin-bottom:10px}
.hint-box{background:#fffbea;border:1px solid #ffe08a;border-radius:8px;
  padding:8px 12px;font-size:12px;color:#856404;margin-bottom:6px}
.feedback-wrap{margin-bottom:12px}
.feedback{border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5}
.feedback-ok{background:#eaf8f0;border:1px solid #a8dfc0}
.feedback-err{background:#fff0f0;border:1px solid #f5b8b8}
.fb-verdict{font-weight:700;margin-bottom:6px;font-size:14px}
.feedback-ok .fb-verdict{color:#1a6e41}
.feedback-err .fb-verdict{color:#c0392b}
.fb-exp{color:#444;border-top:1px solid rgba(0,0,0,.07);padding-top:6px;margin-top:4px}
.q-actions{margin-bottom:10px}
.btn-hint{display:block;width:100%;background:#fffbea;color:#856404;
  border:1px solid #ffe08a;border-radius:10px;padding:10px;
  font-size:13px;font-weight:500;margin-bottom:8px;transition:background .12s}
.btn-hint:hover{background:#fff3c4}
.q-nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding-top:4px}
.btn-nav{background:#f0f2f8;color:#555;border-radius:8px;
  padding:8px 16px;font-size:13px;font-weight:500;transition:background .12s}
.btn-nav:hover{background:#dde2f5}

/* ── END / RESULTS SCREENS ────────────────────────────────────── */
.end-screen,.exam-results{text-align:center}
.end-emoji{font-size:44px;margin:10px 0 8px}
.end-title{font-size:13px;color:#888;margin-bottom:4px}
.end-pct{font-size:52px;font-weight:800;color:#293462;margin-bottom:4px}
.end-msg{font-size:14px;color:#555;margin-bottom:20px}
.end-stats{display:flex;justify-content:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.stat-chip{border-radius:12px;padding:12px 18px;min-width:80px}
.stat-ok{background:#eaf8f0}
.stat-err{background:#fff0f0}
.stat-neutral{background:#f0f2f8}
.stat-relearned{background:#fff8e1}
.chip-value{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:2px}
.stat-ok .chip-value{color:#2d9e5f}
.stat-err .chip-value{color:#e03e3e}
.stat-relearned .chip-value{color:#9a6100}
.chip-label{font-size:11px;color:#888}
.end-section-title{font-size:13px;font-weight:600;color:#444;text-align:left;margin:4px 0 8px}
.topic-list{margin-bottom:16px}
.topic-item{display:flex;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid #f0f2f5;font-size:13px;color:#444;text-align:left}
.topic-err{color:#e03e3e;font-weight:600;font-size:12px}
.recs{text-align:left;padding-left:18px;margin-bottom:22px;color:#555;font-size:13px;line-height:1.9}
.end-btns{display:flex;flex-direction:column;gap:8px}
.exam-details{margin-bottom:24px}
.exam-detail-item{border-radius:10px;padding:12px;margin-bottom:8px;text-align:left}
.detail-ok{background:#f0fdf6;border:1px solid #b8e8cc}
.detail-err{background:#fff5f5;border:1px solid #f5b8b8}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.detail-num{font-size:12px;font-weight:700;color:#4361ee}
.detail-verdict{font-weight:800;font-size:14px}
.detail-ok .detail-verdict{color:#2d9e5f}
.detail-err .detail-verdict{color:#e03e3e}
.detail-topic{font-size:11px;color:#888;background:#f0f2f8;border-radius:20px;padding:1px 7px}
.detail-q{font-size:12px;color:#333;margin-bottom:5px;line-height:1.4}
.detail-ans{font-size:12px;font-weight:600;color:#c0392b;margin-bottom:4px}
.detail-exp{font-size:11px;color:#666;line-height:1.5}

/* ── EXAM HISTORY ─────────────────────────────────────────────── */
.history-list{margin-bottom:16px}
.history-item{display:flex;justify-content:space-between;align-items:center;
  padding:14px 12px;border-radius:12px;margin-bottom:8px;cursor:pointer;
  border:1.5px solid #e0e4f0;background:#f7f8fc;
  transition:border-color .12s,box-shadow .12s}
.history-item:hover{border-color:#4361ee;box-shadow:0 2px 10px rgba(67,97,238,.1)}
.hist-pass{border-left:4px solid #2d9e5f}
.hist-fail{border-left:4px solid #e03e3e}
.hist-left{flex:1}
.hist-date{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
.hist-info{font-size:12px;color:#888}
.hist-right{text-align:right;flex-shrink:0;margin-left:12px}
.hist-pct{font-size:22px;font-weight:800;color:#293462}
.hist-score{font-size:11px;color:#888;margin-bottom:2px}
.hist-badge{font-size:11px;font-weight:600}
.hist-pass .hist-badge{color:#2d9e5f}
.hist-fail .hist-badge{color:#e03e3e}
.empty-state{text-align:center;color:#999;font-size:14px;padding:40px 0;margin-bottom:20px}

/* ── EXPORT / IMPORT ──────────────────────────────────────────── */
.io-card{background:#f7f8fc;border:1.5px solid #e0e4f0;border-radius:14px;
  padding:16px;margin-bottom:16px}
.io-card-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.io-card-desc{font-size:13px;color:#666;margin-bottom:12px;line-height:1.5}
.io-card-info{font-size:12px;color:#4361ee;font-weight:600;margin-bottom:14px;
  background:#eef0fc;border-radius:8px;padding:8px 10px}
.file-input{display:none}
.btn-file-label{display:block;width:100%;background:#f0f2f8;color:#444;border-radius:12px;
  padding:12px;font-size:14px;font-weight:500;margin-bottom:8px;
  transition:background .15s;cursor:pointer;text-align:center}
.btn-file-label:hover{background:#e4e8f5}
.file-name-label{font-size:12px;color:#888;text-align:center;margin-bottom:12px;
  min-height:18px;word-break:break-all}
.import-msg{border-radius:8px;padding:10px 12px;font-size:13px;
  font-weight:600;margin-top:8px;text-align:center}
.import-ok{background:#eaf8f0;color:#1a6e41;border:1px solid #a8dfc0}
.import-err{background:#fff0f0;color:#c0392b;border:1px solid #f5b8b8}

/* ── Responsive ───────────────────────────────────────────────── */
@media(max-width:400px){
  .menu-grid{grid-template-columns:1fr}
  .end-pct{font-size:42px}
  .q-text{font-size:14px}
  .range-row{flex-direction:column}
  .range-sep{display:none}
  .hist-pct{font-size:18px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>// CSA Exam Questions — Batch 1: Q1–Q100
// Each object: { id, q, opts, ans, topic, exp }
// opts: full option strings including letter prefix
// ans: correct letter(s) as sorted string e.g. "A", "AB", "ACD"

const QUESTIONS_001_100 = [
  {
    id: 1,
    q: "A Service Catalog may include which of the following components?",
    opts: [
      "A. Order Guides, Exchange Rates, Calendars",
      "B. Order Guides, Catalog Items, and Interceptors",
      "C. Catalog Items, Asset Contracts, Task Surveys",
      "D. Record Producers, Order Guides, and Catalog Items"
    ],
    ans: "D",
    topic: "Service Catalog",
    exp: "El Service Catalog incluye Record Producers (para crear registros desde el catálogo), Order Guides (para agrupar ítems relacionados) y Catalog Items (los ítems que los usuarios pueden solicitar)."
  },
  {
    id: 2,
    q: "Which one of the following statements applies to a set of fields when they are coalesced during an import?",
    opts: [
      "A. If a match is found using the coalesce fields, the existing record is updated with the information being imported",
      "B. If a match is not found using the coalesce fields, the system does not create a Transform Map",
      "C. If a match is found using the coalesce fields, the system creates a new record",
      "D. If a match is not found using the coalesce fields, the existing record is updated with the information being imported"
    ],
    ans: "A",
    topic: "Import / Transform Maps",
    exp: "Coalesce = campo clave de búsqueda. Si hay coincidencia: se actualiza el registro existente. Si no hay coincidencia: se crea un registro nuevo."
  },
  {
    id: 3,
    q: "As it relates to ServiceNow reporting, which of the following statements describes what a metric can do?",
    opts: [
      "A. A metric is a report gauge used on homepages to display real-time data",
      "B. A metric is a time measurement used to report the effectiveness of workflows and SLAs",
      "C. A metric is used to measure and evaluate the effectiveness of IT service management processes",
      "D. A metric is a comparative measurement used to report the effectiveness of flows and SLAs"
    ],
    ans: "C",
    topic: "Reporting & Metrics",
    exp: "Las métricas en ServiceNow miden y evalúan la efectividad de los procesos de gestión de servicios de TI (ITSM). Son distintas de los gauges de informe."
  },
  {
    id: 4,
    q: "The display sequence is controlled in a Service Catalog Item using which of the following?",
    opts: [
      "A. The Default Value field in the Catalog Item form",
      "B. The Sequence field in the Catalog Item form",
      "C. The Order field in the Variable form",
      "D. The Choice field in the Variable form"
    ],
    ans: "C",
    topic: "Service Catalog",
    exp: "El orden de visualización de las variables de un Catalog Item se controla con el campo 'Order' dentro del formulario de la Variable, no en el propio Catalog Item."
  },
  {
    id: 5,
    q: "Reports can be created from which different places in the platform? (Choose two.)",
    opts: [
      "A. List column heading",
      "B. Metrics module",
      "C. Statistics module",
      "D. View / Run module"
    ],
    ans: "AD",
    topic: "Reporting & Metrics",
    exp: "Los reportes se pueden crear desde: (A) clic derecho en el encabezado de una columna de lista, y (D) el módulo View/Run en el menú de Reports."
  },
  {
    id: 6,
    q: "Knowledge Base Search results can be sorted by which of the following? (Choose three.)",
    opts: [
      "A. Most recent update",
      "B. Popularity",
      "C. Relevancy",
      "D. Manager assignment",
      "E. Number of views"
    ],
    ans: "ACE",
    topic: "Knowledge Management",
    exp: "Los resultados de búsqueda en Knowledge Base se pueden ordenar por: Actualización más reciente (A), Relevancia (C) y Número de vistas (E). Popularidad y asignación de manager no son opciones estándar."
  },
  {
    id: 7,
    q: "What is the path an Administrator could take to view the fulfillment stage task list for an order placed by a user?",
    opts: [
      "A. RITM (Number)>REQ (Number)>PROCUREMENT (Number)",
      "B. REQ (Number)>RITM (Number)>PROCUREMENT (Number)",
      "C. REQ (Number)>RITM (Number)>TASK (Number)",
      "D. FULFILLMENT (Number)>RITM (Number)>TASK (Number)"
    ],
    ans: "C",
    topic: "Service Catalog",
    exp: "La jerarquía es: REQ (Request) → RITM (Request Item) → TASK (Tarea de fulfillment). Esta es la ruta estándar para ver las tareas de cumplimiento."
  },
  {
    id: 8,
    q: "Which term refers to application menus and modules which you may want to access quickly and often?",
    opts: [
      "A. Breadcrumb",
      "B. Favorite",
      "C. Tag",
      "D. Bookmark"
    ],
    ans: "B",
    topic: "Platform Navigation",
    exp: "Los 'Favorites' (Favoritos) son accesos directos en el Application Navigator para módulos y páginas de uso frecuente. Se marcan con una estrella."
  },
  {
    id: 9,
    q: "What is generated from the Service Catalog once a user places an order for an item or service?",
    opts: [
      "A. A change request",
      "B. An Order Guide",
      "C. A request",
      "D. An SLA"
    ],
    ans: "C",
    topic: "Service Catalog",
    exp: "Cuando un usuario hace un pedido en el Service Catalog, se genera un REQ (Request/Solicitud) con su correspondiente RITM (Request Item)."
  },
  {
    id: 10,
    q: "From the User menu, which actions can a user select? (Choose three.)",
    opts: [
      "A. Send Notifications",
      "B. Log Out ServiceNow",
      "C. Elevate Roles",
      "D. Impersonate Users",
      "E. Order from Service Catalog",
      "F. Approve Records"
    ],
    ans: "BCD",
    topic: "Platform Navigation",
    exp: "Desde el menú de usuario (esquina superior derecha) se puede: Cerrar sesión (B), Elevar roles temporalmente (C) e Impersonar usuarios para pruebas (D)."
  },
  {
    id: 11,
    q: "Buttons, form links, and context menu items are all examples of what type of functionality?",
    opts: [
      "A. Business Rule",
      "B. UI Action",
      "C. Client Script",
      "D. UI Policy"
    ],
    ans: "B",
    topic: "UI Development",
    exp: "Las UI Actions son botones, enlaces de formulario y elementos de menú contextual que se ejecutan cuando el usuario interactúa con la interfaz."
  },
  {
    id: 12,
    q: "Which of the following is true of Service Catalog Items in relation to the Service Catalog?",
    opts: [
      "A. They run behind the scenes.",
      "B. They are the building blocks.",
      "C. They are optional.",
      "D. They provide options."
    ],
    ans: "B",
    topic: "Service Catalog",
    exp: "Los Catalog Items son los bloques de construcción del Service Catalog. Sin ellos el catálogo no tendría contenido para ofrecer a los usuarios."
  },
  {
    id: 13,
    q: "Table Access Control rules are processed in the following order:",
    opts: [
      "A. any table name (wildcard), parent table name, table name",
      "B. table name, parent table name, any table name (wildcard)",
      "C. parent table name, table name, any table name (wildcard)",
      "D. any table name (wildcard), table name, parent table name"
    ],
    ans: "B",
    topic: "Security / Access Control",
    exp: "Las ACL se procesan de más específico a menos específico: Nombre de tabla específico → Tabla padre → Comodín (*). La primera regla que coincide se aplica."
  },
  {
    id: 14,
    q: "What is the platform name for the User table?",
    opts: [
      "A. u_users",
      "B. sys_users",
      "C. x_users",
      "D. sys_user"
    ],
    ans: "D",
    topic: "Tables & Database",
    exp: "La tabla de usuarios en ServiceNow se llama 'sys_user' (sin 's' al final). El prefijo 'sys_' indica tablas de sistema nativas de ServiceNow."
  },
  {
    id: 15,
    q: "A REQ number in the Service Catalog represents:",
    opts: [
      "A. the order number",
      "B. the stage",
      "C. the task to complete",
      "D. the individual item in the order"
    ],

<script>// engine.js — State, scoring, spaced repetition, exam history, export/import

const Engine = (() => {

  const KEY_PROGRESS = 'csa_progress';
  const KEY_SESSION  = 'csa_session';
  const KEY_WRONGS   = 'csa_wrongs';
  const KEY_HISTORY  = 'csa_exam_history'; // array of completed exam records

  const STATE = {
    UNSEEN:    'unseen',
    WRONG:     'wrong',
    RELEARNED: 'relearned',
    MASTERED:  'mastered'
  };

  let ALL_QUESTIONS = [];

  function init() {
    ALL_QUESTIONS = [
      ...QUESTIONS_001_100,
      ...QUESTIONS_101_200,
      ...QUESTIONS_201_300,
      ...QUESTIONS_301_408
    ];
    const seen = new Set();
    ALL_QUESTIONS = ALL_QUESTIONS.filter(q => {
      if (seen.has(q.id)) return false;
      seen.add(q.id); return true;
    });
    ALL_QUESTIONS.sort((a, b) => a.id - b.id);
  }

  function getAll()    { return ALL_QUESTIONS; }
  function getById(id) { return ALL_QUESTIONS.find(q => q.id === id) || null; }
  function getTotal()  { return ALL_QUESTIONS.length; }

  // ─── Persistence ──────────────────────────────────────────────────────────
  function load(key, fallback) {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
    catch { return fallback; }
  }
  function save(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }

  // ─── Progress ─────────────────────────────────────────────────────────────
  function getProgress() { return load(KEY_PROGRESS, {}); }

  function getQuestionState(id) {
    const prog = getProgress();
    return prog[id] ? prog[id].state : STATE.UNSEEN;
  }

  function recordAnswer(id, isCorrect) {
    const prog = getProgress();
    if (!prog[id]) prog[id] = { correct:0, wrong:0, lastSeen:0, interval:1,
                                state: STATE.UNSEEN, correctStreak:0 };
    const e = prog[id];
    e.lastSeen = Date.now();
    if (isCorrect) {
      e.correct++;
      e.correctStreak = (e.correctStreak || 0) + 1;
      e.interval = Math.min(Math.round(e.interval * 1.8), 60);
      if      (e.state === STATE.WRONG)     { e.state = STATE.RELEARNED; e.correctStreak = 1; }
      else if (e.state === STATE.RELEARNED) { if (e.correctStreak >= 2) e.state = STATE.MASTERED; }
      else                                    e.state = STATE.MASTERED;
    } else {
      e.wrong++;
      e.correctStreak = 0;
      e.interval = 1;
      e.state = STATE.WRONG;
      const wrongs = getWrongIds();
      if (!wrongs.includes(id)) { wrongs.push(id); save(KEY_WRONGS, wrongs); }
    }
    save(KEY_PROGRESS, prog);
  }

  // ─── Wrong / Relearned ────────────────────────────────────────────────────
  function getWrongIds()          { return load(KEY_WRONGS, []); }
  function getWrongQuestions()    { const p = getProgress(); return ALL_QUESTIONS.filter(q => p[q.id] && p[q.id].state === STATE.WRONG); }
  function getRelearningQuestions(){ const p = getProgress(); return ALL_QUESTIONS.filter(q => p[q.id] && p[q.id].state === STATE.RELEARNED); }
  function clearWrongs()          { save(KEY_WRONGS, []); }

  // ─── Spaced repetition ────────────────────────────────────────────────────
  function getSpacedQueue() {
    const prog = getProgress();
    const DAY  = 86400000;
    const ord  = { [STATE.WRONG]:0, [STATE.UNSEEN]:1, [STATE.RELEARNED]:2, [STATE.MASTERED]:3 };
    return [...ALL_QUESTIONS].sort((a, b) => {
      const pa = prog[a.id], pb = prog[b.id];
      const sa = pa ? pa.state : STATE.UNSEEN;
      const sb = pb ? pb.state : STATE.UNSEEN;
      if (ord[sa] !== ord[sb]) return ord[sa] - ord[sb];
      if (!pa && !pb) return a.id - b.id;
      if (!pa) return -1; if (!pb) return 1;
      return (pa.lastSeen + pa.interval * DAY) - (pb.lastSeen + pb.interval * DAY);
    });
  }

  // ─── Session ───────────────────────────────────────────────────────────────
  let session = null;

  function buildQueue(mode, options = {}) {
    let questions;
    switch (mode) {
      case 'sequential': questions = [...ALL_QUESTIONS]; break;
      case 'random':     questions = shuffle([...ALL_QUESTIONS]); break;
      case 'review': {
        const w = getWrongQuestions(), r = getRelearningQuestions();
        questions = [...w, ...r];
        if (!questions.length) questions = shuffle([...ALL_QUESTIONS]).slice(0, 20);
        break;
      }
      case 'spaced': questions = getSpacedQueue(); break;
      case 'exam': {
        const n = Math.min(options.count || 40, ALL_QUESTIONS.length);
        questions = shuffle([...ALL_QUESTIONS]).slice(0, n);
        break;
      }
      case 'goto': {
        const idx = ALL_QUESTIONS.findIndex(q => q.id === (options.startId || 1));
        questions = ALL_QUESTIONS.slice(idx >= 0 ? idx : 0);
        break;
      }
      case 'range': {
        const from = options.startId || 1;
        const to   = options.endId   || ALL_QUESTIONS[ALL_QUESTIONS.length - 1].id;
        questions  = ALL_QUESTIONS.filter(q => q.id >= from && q.id <= to);
        if (options.shuffle) questions = shuffle([...questions]);
        break;
      }
      default: questions = [...ALL_QUESTIONS];
    }
    return questions.map(q => q.id);
  }

  function startSession(mode, options = {}) {
    const queue = buildQueue(mode, options);
    session = {
      mode, queue, current: 0,
      score: 0, total: 0,
      wrongInSession: [],
      examMode: mode === 'exam',
      examAnswers: {},
      startTime: Date.now(),
      options: { ...options }
    };
    saveSession();
    return session;
  }

  function saveSession()    { if (session) save(KEY_SESSION, session); }
  function restoreSession() { session = load(KEY_SESSION, null); return session; }
  function getSession()     { return session; }

  function getCurrentQuestion() {
    if (!session) return null;
    return getById(session.queue[session.current]);
  }

  function hasNext() { return session && session.current < session.queue.length - 1; }
  function hasPrev() { return session && session.current > 0; }
  function goNext()  { if (hasNext()) { session.current++; saveSession(); } }
  function goPrev()  { if (hasPrev()) { session.current--; saveSession(); } }

  function goToIndex(idx) {
    if (session && idx >= 0 && idx < session.queue.length) {
      session.current = idx; saveSession();
    }
  }
  function goToQuestionId(id) {
    if (!session) return false;
    const idx = session.queue.indexOf(id);
    if (idx >= 0) { session.current = idx; saveSession(); return true; }
    return false;
  }

  // ─── Answer checking ───────────────────────────────────────────────────────
  function checkAnswer(questionId, userAns) {
    const q = getById(questionId);
    if (!q) return { correct:false, correctAns:'', prevState:STATE.UNSEEN, newState:STATE.UNSEEN };
    const normalized = userAns.split('').sort().join('');
    const isCorrect  = normalized === q.ans;
    if (session) {
      session.total++;
      if (isCorrect) { session.score++; }
      else if (!session.wrongInSession.includes(questionId)) session.wrongInSession.push(questionId);
      if (session.examMode) session.examAnswers[questionId] = normalized;
      saveSession();
    }
    const prevState = getQuestionState(questionId);
    recordAnswer(questionId, isCorrect);
    const newState  = getQuestionState(questionId);
    return { correct: isCorrect, correctAns: q.ans, prevState, newState };
  }

  // ─── Session stats ─────────────────────────────────────────────────────────
  function getSessionStats() {
    if (!session) return null;
    const pct     = session.total > 0 ? Math.round(session.score / session.total * 100) : 0;
    const elapsed = Math.round((Date.now() - session.startTime) / 1000);
    const topicErrors = {};
    session.wrongInSession.forEach(id => {
      const q = getById(id);
      if (q) topicErrors[q.topic] = (topicErrors[q.topic] || 0) + 1;
    });
    const topicsToReview = Object.entries(topicErrors)
      .sort((a, b) => b[1] - a[1]).slice(0, 5)
      .map(([topic, count]) => ({ topic, count }));
    return {
      score: session.score, total: session.total, pct,
      wrong: session.total - session.score,
      wrongInSession: session.wrongInSession,
      topicsToReview, elapsed,
      mode: session.mode, queueLen: session.queue.length
    };
  }

  // ─── Exam results + save to history ───────────────────────────────────────
  function getExamResults() {
    if (!session || !session.examMode) return null;
    const results = session.queue.map(id => {
      const q = getById(id);
      const userAns = session.examAnswers[id] || '';
      return { q, userAns, correct: userAns === q.ans };
    });
    const score = results.filter(r => r.correct).length;
    const total = results.length;
    const pct   = Math.round(score / total * 100);
    return { results, score, total, pct };
  }

  // Call this once when an exam finishes to persist it
  function saveExamToHistory() {
    if (!session || !session.examMode) return null;
    const data = getExamResults();
    if (!data) return null;

    const history = load(KEY_HISTORY, []);
    const entry = {
      id:        Date.now(),
      date:      new Date().toISOString(),
      mode:      session.mode,
      options:   session.options || {},
      score:     data.score,
      total:     data.total,
      pct:       data.pct,
      elapsed:   Math.round((Date.now() - session.startTime) / 1000),
      // Store minimal result data (qId + userAns + correct) to keep size small
      results:   data.results.map(r => ({
        qId:     r.q.id,
        userAns: r.userAns,
        correct: r.correct
      }))
    };
    history.unshift(entry); // newest first
    // Keep last 50 exams
    save(KEY_HISTORY, history.slice(0, 50));
    return entry;
  }

  // ─── Exam history ──────────────────────────────────────────────────────────
  function getExamHistory() {
    return load(KEY_HISTORY, []);
  }

  // Reconstruct a past exam entry for review (re-hydrate question objects)
  function getExamHistoryEntry(examId) {
    const history = getExamHistory();
    const entry   = history.find(e => e.id === examId);
    if (!entry) return null;
    return {
      ...entry,
      results: entry.results.map(r => ({
        q:       getById(r.qId),
        userAns: r.userAns,
        correct: r.correct
      })).filter(r => r.q) // safety: skip if question no longer exists
    };
  }

  function clearExamHistory() {
    save(KEY_HISTORY, []);
  }

  // ─── Overall stats ─────────────────────────────────────────────────────────
  function getOverallStats() {
    const prog = getProgress();
    const ids  = Object.keys(prog).map(Number);
    const seen    = ids.length;
    const correct = ids.reduce((s, id) => s + (prog[id].correct || 0), 0);
    const wrong   = ids.reduce((s, id) => s + (prog[id].wrong   || 0), 0);
    const total   = correct + wrong;
    const pct     = total > 0 ? Math.round(correct / total * 100) : 0;

    let countWrong = 0, countRelearned = 0, countMastered = 0;
    ALL_QUESTIONS.forEach(q => {
      const p = prog[q.id]; if (!p) return;
      if      (p.state === STATE.WRONG)     countWrong++;
      else if (p.state === STATE.RELEARNED) countRelearned++;
      else if (p.state === STATE.MASTERED)  countMastered++;
    });

    const topicMap = {};
    ALL_QUESTIONS.forEach(q => {
      if (!topicMap[q.topic]) topicMap[q.topic] = { seen:0, correct:0, wrong:0 };
      const p = prog[q.id];
      if (p) { topicMap[q.topic].seen++; topicMap[q.topic].correct += p.correct; topicMap[q.topic].wrong += p.wrong; }
    });

    return {
      seen, total: ALL_QUESTIONS.length, correct, wrong, pct,
      wrongCount: countWrong, relearnedCount: countRelearned, masteredCount: countMastered,
      topicMap
    };
  }

  // ─── Hints ────────────────────────────────────────────────────────────────
  function getHints(questionId, level) {
    const q = getById(questionId);
    if (!q) return [];
    return [
      `Tema: ${q.topic}`,
      `La respuesta tiene ${q.ans.length} opción${q.ans.length > 1 ? 'es' : ''}: ${q.ans.split('').join(', ')}`
    ].slice(0, level);
  }

  // ─── Export / Import ──────────────────────────────────────────────────────
  function exportData() {
    return JSON.stringify({
      version:    2,
      exportedAt: new Date().toISOString(),
      progress:   load(KEY_PROGRESS, {}),
      wrongs:     load(KEY_WRONGS, []),
      history:    load(KEY_HISTORY, [])
      // session intentionally excluded (device-specific position)
    }, null, 2);
  }

  function importData(jsonString) {
    const data = JSON.parse(jsonString);
    // Basic validation
    if (!data || typeof data !== 'object') throw new Error('Formato inválido');
    if (data.version !== 2 && data.version !== 1)
      throw new Error('Versión de archivo no compatible');
    if (data.progress) save(KEY_PROGRESS, data.progress);
    if (data.wrongs)   save(KEY_WRONGS,   data.wrongs);
    if (data.history)  save(KEY_HISTORY,  data.history);
    return true;
  }

  // ─── Utilities ────────────────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function resetAll() {
    save(KEY_PROGRESS, {}); save(KEY_WRONGS, []);
    save(KEY_SESSION, null); save(KEY_HISTORY, []);
    session = null;
  }

  // ─── Public API ────────────────────────────────────────────────────────────
  return {
    STATE,
    init, getAll, getById, getTotal,
    startSession, restoreSession, getSession, getCurrentQuestion,
    hasNext, hasPrev, goNext, goPrev, goToIndex, goToQuestionId,
    checkAnswer,
    getSessionStats, getExamResults, saveExamToHistory,
    getExamHistory, getExamHistoryEntry, clearExamHistory,
    getOverallStats, getProgress, getQuestionState,
    getWrongIds, getWrongQuestions, getRelearningQuestions, clearWrongs,
    getHints, exportData, importData, resetAll, shuffle
  };

})();
</script>
<script>// ui.js — All screen rendering and event handling

const UI = (() => {

  let root      = null;
  let hintLevel = 0;
  let examNumInput = 40;

  function mount(rootEl) {
    root = rootEl;
    Engine.init();
    const saved = Engine.restoreSession();
    renderHome(!!(saved && saved.queue && saved.queue.length > 0 && !saved.examMode));
  }

  // ─── DOM helpers ──────────────────────────────────────────────────────────
  function el(tag, attrs, ...children) {
    const e = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if      (k === 'cls')        e.className = v;
      else if (k === 'html')       e.innerHTML = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
      else                         e.setAttribute(k, v);
    });
    children.forEach(c => {
      if (c == null) return;
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
    return e;
  }

  function qs(sel)   { return root.querySelector(sel); }
  function render(n) { root.innerHTML = ''; root.appendChild(n); root.scrollTop = 0; }
  function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }

  const STATE_META = {
    [Engine.STATE.WRONG]:     { label:'Error',       cls:'state-wrong',     icon:'✗' },
    [Engine.STATE.RELEARNED]: { label:'Reaprendida', cls:'state-relearned', icon:'◑' },
    [Engine.STATE.MASTERED]:  { label:'Dominada',    cls:'state-mastered',  icon:'✓' },
    [Engine.STATE.UNSEEN]:    { label:'Sin ver',     cls:'state-unseen',    icon:'○' }
  };

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' })
      + ' ' + d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  }

  function fmtElapsed(s) {
    if (!s) return '';
    const m = Math.floor(s / 60), sec = s % 60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
  }

  // ─── HOME ──────────────────────────────────────────────────────────────────
  function renderHome(hasSaved) {
    const stats       = Engine.getOverallStats();
    const wrongCount  = Engine.getWrongQuestions().length;
    const relCount    = Engine.getRelearningQuestions().length;
    const reviewCount = wrongCount + relCount;
    const historyLen  = Engine.getExamHistory().length;

    const wrap = el('div', { cls:'screen home' });
    wrap.appendChild(el('div', { cls:'home-logo' }, 'ServiceNow CSA'));
    wrap.appendChild(el('div', { cls:'home-sub'  },
      `${Engine.getTotal()} preguntas · Examen oficial Feb 2026`));

    // tri-color bar
    if (stats.seen > 0) {
      const T = Engine.getTotal();
      const bar = el('div', { cls:'global-bar' });
      if (stats.masteredCount)  { const f = el('div',{cls:'bar-mastered'} ); f.style.width=pct(stats.masteredCount, T)+'%';  bar.appendChild(f); }
      if (stats.relearnedCount) { const f = el('div',{cls:'bar-relearned'}); f.style.width=pct(stats.relearnedCount,T)+'%';  bar.appendChild(f); }
      if (stats.wrongCount)     { const f = el('div',{cls:'bar-wrong'}    ); f.style.width=pct(stats.wrongCount,    T)+'%';  bar.appendChild(f); }
      wrap.appendChild(bar);
      const leg = el('div',{cls:'bar-legend'});
      if (stats.masteredCount)  leg.appendChild(el('span',{cls:'legend-mastered'},  `✓ ${stats.masteredCount} dom.`));
      if (stats.relearnedCount) leg.appendChild(el('span',{cls:'legend-relearned'}, `◑ ${stats.relearnedCount} reap.`));
      if (stats.wrongCount)     leg.appendChild(el('span',{cls:'legend-wrong'},     `✗ ${stats.wrongCount} error`));
      const unseen = T - stats.seen;
      if (unseen > 0)           leg.appendChild(el('span',{cls:'legend-unseen'},    `○ ${unseen} sin ver`));
      wrap.appendChild(leg);
    }

    const grid = el('div', { cls:'menu-grid' });

    grid.appendChild(menuCard('▶', 'Estudiar en orden', 'Q1 → Q408 secuencialmente', () => {
      Engine.startSession('sequential'); hintLevel=0; renderQuestion();
    }));
    grid.appendChild(menuCard('🔀', 'Orden aleatorio', 'Preguntas mezcladas', () => {
      Engine.startSession('random'); hintLevel=0; renderQuestion();
    }));
    grid.appendChild(menuCard('🎯', 'Rango de preguntas', 'Elige desde Q? hasta Q?', () => {
      renderRangeScreen();
    }));
    grid.appendChild(menuCard('📝', 'Examen simulado', 'Sin respuestas hasta el final', () => {
      renderExamSetup();
    }));

    const reviewDesc = reviewCount > 0
      ? `${wrongCount>0?wrongCount+' errores':''}${wrongCount>0&&relCount>0?' · ':''}${relCount>0?relCount+' reaprendidas':''}`
      : 'Sin preguntas pendientes';
    const reviewCard = menuCard('🔁', 'Repasar errores', reviewDesc,
      reviewCount > 0 ? () => { Engine.startSession('review'); hintLevel=0; renderQuestion(); } : null);
    if (!reviewCount) reviewCard.classList.add('disabled');
    grid.appendChild(reviewCard);

    grid.appendChild(menuCard('🧠', 'Repaso inteligente', 'Prioriza tus puntos débiles', () => {
      Engine.startSession('spaced'); hintLevel=0; renderQuestion();
    }));

    // History card
    const histDesc = historyLen > 0 ? `${historyLen} examen${historyLen!==1?'es':''} guardado${historyLen!==1?'s':''}` : 'Sin exámenes todavía';
    const histCard = menuCard('📋', 'Historial de exámenes', histDesc,
      historyLen > 0 ? () => renderExamHistory() : null);
    if (!historyLen) histCard.classList.add('disabled');
    grid.appendChild(histCard);

    // Export/Import card (always enabled)
    grid.appendChild(menuCard('💾', 'Exportar / Importar', 'Guarda o restaura tu progreso', () => {
      renderExportImport();
    }));

    wrap.appendChild(grid);

    if (hasSaved) {
      const s = Engine.getSession(), q = Engine.getCurrentQuestion();
      if (s && q) {
        const ml = {sequential:'secuencial',random:'aleatorio',range:'rango',
                    review:'errores',spaced:'inteligente',goto:'pregunta'}[s.mode]||s.mode;
        wrap.appendChild(el('button',{cls:'btn-continue',
          onclick:()=>{hintLevel=0;renderQuestion();}
        }, `↩ Continuar · Q${q.id} · modo ${ml} (${s.current+1}/${s.queue.length})`));
      }
    }

    if (stats.seen > 0) {
      wrap.appendChild(el('div',{cls:'home-stats'},
        el('span',{}, `${stats.seen}/${stats.total} vistas`),
        el('span',{}, `${stats.pct}% precisión`)
      ));
    }

    wrap.appendChild(el('button',{cls:'btn-link', onclick:()=>{
      if(confirm('¿Borrar todo el progreso? Esta acción no se puede deshacer.')) {
        Engine.resetAll(); renderHome(false);
      }
    }}, '⚙ Borrar todo el progreso'));

    render(wrap);
  }

  function menuCard(icon, title, desc, onClick) {
    const card = el('div',{cls:'menu-card'});
    if (onClick) card.addEventListener('click', onClick);
    card.appendChild(el('div',{cls:'card-icon'},  icon));
    card.appendChild(el('div',{cls:'card-title'}, title));
    card.appendChild(el('div',{cls:'card-desc'},  desc));
    return card;
  }

  // ─── RANGE SCREEN ─────────────────────────────────────────────────────────
  function renderRangeScreen() {
    const total = Engine.getTotal();
    const wrap  = el('div',{cls:'screen goto-screen'});
    wrap.appendChild(el('h2',{cls:'screen-title'}, '🎯 Rango de preguntas'));
    wrap.appendChild(el('p', {cls:'screen-desc'},  `Selecciona el rango (1 – ${total}) y si quieres orden aleatorio.`));

    const row = el('div',{cls:'range-row'});
    const fromWrap = el('div',{cls:'range-field'});
    fromWrap.appendChild(el('label',{cls:'range-label'},'Desde'));
    const fromInput = el('input',{type:'number',min:'1',max:String(total),cls:'goto-input',placeholder:'1'});
    fromInput.value='1'; fromWrap.appendChild(fromInput); row.appendChild(fromWrap);
    row.appendChild(el('div',{cls:'range-sep'},'—'));
    const toWrap = el('div',{cls:'range-field'});
    toWrap.appendChild(el('label',{cls:'range-label'},'Hasta'));
    const toInput = el('input',{type:'number',min:'1',max:String(total),cls:'goto-input',placeholder:String(total)});
    toInput.value=String(total); toWrap.appendChild(toInput); row.appendChild(toWrap);
    wrap.appendChild(row);

    const countLabel = el('div',{cls:'range-count'}, `${total} preguntas seleccionadas`);
    wrap.appendChild(countLabel);
    function updateCount() {
      const f=parseInt(fromInput.value)||1, t=parseInt(toInput.value)||total;
      const n=Engine.getAll().filter(q=>q.id>=f&&q.id<=t).length;
      countLabel.textContent=`${n} pregunta${n!==1?'s':''} seleccionada${n!==1?'s':''}`;
    }
    fromInput.addEventListener('input',updateCount); toInput.addEventListener('input',updateCount);

    const shuffleRow=el('div',{cls:'range-shuffle-row'});
    const shuffleChk=el('input',{type:'checkbox',id:'range-shuffle'});
    shuffleRow.appendChild(shuffleChk);
    shuffleRow.appendChild(el('label',{'for':'range-shuffle'},'Orden aleatorio'));
    wrap.appendChild(shuffleRow);

    const go = () => {
      const from=Math.max(1,Math.min(total,parseInt(fromInput.value)||1));
      const to  =Math.max(from,Math.min(total,parseInt(toInput.value)||total));
      const n=Engine.getAll().filter(q=>q.id>=from&&q.id<=to).length;
      if(n===0){fromInput.classList.add('error');return;}
      Engine.startSession('range',{startId:from,endId:to,shuffle:shuffleChk.checked});
      hintLevel=0; renderQuestion();
    };

    wrap.appendChild(el('button',{cls:'btn-primary',onclick:go},'Empezar'));
    wrap.appendChild(el('button',{cls:'btn-secondary',onclick:()=>renderHome(Engine.restoreSession()!==null)},'← Volver'));
    render(wrap);
  }

  // ─── EXAM SETUP ───────────────────────────────────────────────────────────
  function renderExamSetup() {
    const wrap=el('div',{cls:'screen exam-setup'});
    wrap.appendChild(el('h2',{cls:'screen-title'},'Examen simulado'));
    wrap.appendChild(el('p', {cls:'screen-desc'}, 'Las respuestas se muestran al finalizar.'));
    const row=el('div',{cls:'exam-row'});
    row.appendChild(el('label',{cls:'exam-label'},'Número de preguntas:'));
    const input=el('input',{type:'number',min:'5',max:'408',cls:'exam-input'});
    input.value=String(examNumInput);
    input.addEventListener('input',()=>{examNumInput=parseInt(input.value)||40;});
    row.appendChild(input); wrap.appendChild(row);
    wrap.appendChild(el('button',{cls:'btn-primary',onclick:()=>{
      const n=Math.max(5,Math.min(408,parseInt(input.value)||40));
      Engine.startSession('exam',{count:n}); hintLevel=0; renderQuestion();
    }},'Comenzar examen'));
    wrap.appendChild(el('button',{cls:'btn-secondary',onclick:()=>renderHome(Engine.restoreSession()!==null)},'← Volver'));
    render(wrap);
  }

  // ─── QUESTION SCREEN ──────────────────────────────────────────────────────
  function renderQuestion() {
    const s=Engine.getSession(), q=Engine.getCurrentQuestion();
    if(!s||!q){renderHome(false);return;}

    const isMulti  = q.ans.length>1;
    const isExam   = s.examMode;
    const progress = s.current+1;
    const total    = s.queue.length;
    const qState   = Engine.getQuestionState(q.id);
    const sMeta    = STATE_META[qState];

    const wrap=el('div',{cls:'screen question-screen'});

    // top bar
    const topBar=el('div',{cls:'q-topbar'});
    topBar.appendChild(el('button',{cls:'btn-home',onclick:()=>renderHome(true)},'⌂'));
    const pw=el('div',{cls:'q-progress-wrap'});
    const pb=el('div',{cls:'q-progress-bar'}); const pf=el('div',{cls:'q-progress-fill'});
    pf.style.width=pct(progress,total)+'%'; pb.appendChild(pf); pw.appendChild(pb);
    pw.appendChild(el('div',{cls:'q-progress-label'},`${progress} / ${total}`));
    topBar.appendChild(pw);
    topBar.appendChild(el('div',{cls:'q-score-chip'},`✓${s.score}  ✗${s.total-s.score}`));
    wrap.appendChild(topBar);

    // meta
    const meta=el('div',{cls:'q-meta'});
    meta.appendChild(el('span',{cls:'q-num'},`#${q.id}`));
    meta.appendChild(el('span',{cls:'q-topic'},q.topic));
    if(isMulti) meta.appendChild(el('span',{cls:'q-multi'},`Elige ${q.ans.length}`));
    if(isExam)  meta.appendChild(el('span',{cls:'q-exam-badge'},'EXAMEN'));
    if(qState!==Engine.STATE.UNSEEN)
      meta.appendChild(el('span',{cls:`q-state-badge ${sMeta.cls}`},`${sMeta.icon} ${sMeta.label}`));
    wrap.appendChild(meta);

    wrap.appendChild(el('div',{cls:'q-text'},q.q));

    // options
    const optsWrap=el('div',{cls:'q-opts',id:'opts-wrap'});
    const sel=new Set(); let answered=false;

    q.opts.forEach(opt=>{
      const letter=opt.charAt(0), text=opt.slice(3);
      const optEl=el('div',{cls:'q-opt','data-letter':letter});
      optEl.appendChild(el('span',{cls:'opt-letter'},letter));
      optEl.appendChild(el('span',{cls:'opt-text'},text));
      optEl.addEventListener('click',()=>{
        if(answered)return;
        if(isMulti){
          if(sel.has(letter)){sel.delete(letter);optEl.classList.remove('selected');}
          else{sel.add(letter);optEl.classList.add('selected');}
        }else{
          wrap.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('selected'));
          sel.clear(); sel.add(letter); optEl.classList.add('selected');
        }
        const btn=qs('#btn-confirm'); if(btn) btn.disabled=sel.size===0;
      });
      optsWrap.appendChild(optEl);
    });
    wrap.appendChild(optsWrap);

    if(!isExam){
      const hw=el('div',{cls:'hints-wrap',id:'hints-wrap'}); renderHints(hw,q.id); wrap.appendChild(hw);
    }
    wrap.appendChild(el('div',{cls:'feedback-wrap',id:'feedback-wrap'}));

    // actions
    const actions=el('div',{cls:'q-actions',id:'q-actions'});

    const confirmBtn=el('button',{cls:'btn-primary',id:'btn-confirm',disabled:'true',onclick:()=>{
      if(answered||sel.size===0)return; answered=true;
      const userAns=[...sel].sort().join('');
      const {correct,correctAns,prevState,newState}=Engine.checkAnswer(q.id,userAns);

      const cSet=new Set(correctAns.split(''));
      wrap.querySelectorAll('.q-opt').forEach(o=>{
        const l=o.getAttribute('data-letter'); o.classList.remove('selected');
        if(cSet.has(l)) o.classList.add('correct');
        else if(sel.has(l)) o.classList.add('wrong');
      });

      if(!isExam){
        const fbWrap=qs('#feedback-wrap');
        const fb=el('div',{cls:`feedback ${correct?'feedback-ok':'feedback-err'}`});
        const vLine=el('div',{cls:'fb-verdict'});
        vLine.appendChild(document.createTextNode(
          correct ? '✓ Correcto' : `✗ Incorrecto · Respuesta: ${correctAns.split('').join(', ')}`));
        if(correct&&prevState===Engine.STATE.WRONG)
          vLine.appendChild(el('span',{cls:'state-transition-badge state-relearned'},' · ◑ Reaprendida'));
        else if(correct&&prevState===Engine.STATE.RELEARNED&&newState===Engine.STATE.MASTERED)
          vLine.appendChild(el('span',{cls:'state-transition-badge state-mastered'},' · ✓ ¡Dominada!'));
        else if(!correct&&(prevState===Engine.STATE.MASTERED||prevState===Engine.STATE.RELEARNED))
          vLine.appendChild(el('span',{cls:'state-transition-badge state-wrong'},' · ✗ Vuelve a errores'));
        fb.appendChild(vLine);
        fb.appendChild(el('div',{cls:'fb-exp'},q.exp));
        fbWrap.appendChild(fb);
      }

      confirmBtn.style.display='none';
      if(!isExam){hintLevel=0;const hw=qs('#hints-wrap');if(hw)hw.innerHTML='';}

      const isLast=!Engine.hasNext();
      actions.appendChild(el('button',{cls:'btn-primary',id:'btn-next',onclick:()=>{
        if(isLast){ isExam ? renderExamResultsAndSave() : renderSessionEnd(); }
        else       { Engine.goNext(); hintLevel=0; renderQuestion(); }
      }}, isLast?(isExam?'Ver resultados →':'Finalizar sesión →'):'Siguiente →'));
    }},'Confirmar respuesta');
    confirmBtn.disabled=true;
    actions.appendChild(confirmBtn);

    if(!isExam&&hintLevel<2){
      actions.appendChild(el('button',{cls:'btn-hint',id:'btn-hint',onclick:()=>{
        hintLevel=Math.min(hintLevel+1,2);
        const hw=qs('#hints-wrap'); if(hw) renderHints(hw,q.id);
        if(hintLevel>=2){const hb=qs('#btn-hint');if(hb)hb.style.display='none';}
      }},`💡 Pista (${hintLevel}/2)`));
    }

    const nav=el('div',{cls:'q-nav'});
    if(Engine.hasPrev()) nav.appendChild(el('button',{cls:'btn-nav',onclick:()=>{Engine.goPrev();hintLevel=0;renderQuestion();}},'← Anterior'));
    nav.appendChild(el('button',{cls:'btn-nav',onclick:()=>renderHome(true)},'⌂ Menú'));
    if(Engine.hasNext()) nav.appendChild(el('button',{cls:'btn-nav',onclick:()=>{Engine.goNext();hintLevel=0;renderQuestion();}},'Siguiente →'));

    wrap.appendChild(actions);
    wrap.appendChild(nav);
    render(wrap);
  }

  function renderHints(container, qId) {
    container.innerHTML='';
    Engine.getHints(qId,hintLevel).forEach(h=>{
      container.appendChild(el('div',{cls:'hint-box'},`💡 ${h}`));
    });
  }

  // ─── SESSION END ──────────────────────────────────────────────────────────
  function renderSessionEnd() {
    const stats=Engine.getSessionStats(); if(!stats){renderHome(false);return;}
    const emoji=stats.pct>=85?'🏆':stats.pct>=70?'👍':stats.pct>=50?'📚':'💪';
    const msg  =stats.pct>=85?'¡Excelente! Listo para el examen.':
                 stats.pct>=70?'Buen progreso. Repasa los temas fallados.':
                 stats.pct>=50?'Sigue practicando.':'Repasa los conceptos clave.';
    const wrap=el('div',{cls:'screen end-screen'});
    wrap.appendChild(el('div',{cls:'end-emoji'},emoji));
    wrap.appendChild(el('div',{cls:'end-title'},'Sesión completada'));
    wrap.appendChild(el('div',{cls:'end-pct'},`${stats.pct}%`));
    wrap.appendChild(el('div',{cls:'end-msg'},msg));
    const sr=el('div',{cls:'end-stats'});
    sr.appendChild(statChip('Correctas',  stats.score,'ok'));
    sr.appendChild(statChip('Incorrectas',stats.wrong,'err'));
    sr.appendChild(statChip('Total',      stats.total,'neutral'));
    wrap.appendChild(sr);
    if(stats.topicsToReview.length){
      wrap.appendChild(el('div',{cls:'end-section-title'},'Temas a reforzar:'));
      const tl=el('div',{cls:'topic-list'});
      stats.topicsToReview.forEach(({topic,count})=>tl.appendChild(el('div',{cls:'topic-item'},
        el('span',{},topic), el('span',{cls:'topic-err'},`${count} error${count!==1?'es':''}`)))); 
      wrap.appendChild(tl);
    }
    const overall=Engine.getOverallStats();
    if(overall.relearnedCount>0||overall.wrongCount>0){
      wrap.appendChild(el('div',{cls:'end-section-title'},'Estado global:'));
      const sr2=el('div',{cls:'end-stats'});
      sr2.appendChild(statChip('✓ Dom.',  overall.masteredCount, 'ok'));
      sr2.appendChild(statChip('◑ Reap.',overall.relearnedCount,'relearned'));
      sr2.appendChild(statChip('✗ Error',overall.wrongCount,    'err'));
      wrap.appendChild(sr2);
    }
    const btns=el('div',{cls:'end-btns'});
    const rt=Engine.getWrongQuestions().length+Engine.getRelearningQuestions().length;
    if(rt) btns.appendChild(el('button',{cls:'btn-primary',onclick:()=>{Engine.startSession('review');hintLevel=0;renderQuestion();}},'🔁 Repasar errores y reaprendidas'));
    btns.appendChild(el('button',{cls:'btn-secondary',onclick:()=>renderHome(false)},'⌂ Menú principal'));
    wrap.appendChild(btns);
    render(wrap);
  }

  // ─── EXAM RESULTS (saves to history) ──────────────────────────────────────
  function renderExamResultsAndSave() {
    Engine.saveExamToHistory(); // persist before rendering
    renderExamResultsScreen(Engine.getExamResults());
  }

  function renderExamResultsScreen(data) {
    if(!data){renderHome(false);return;}
    const {results,score,total,pct:ep}=data;
    const wrap=el('div',{cls:'screen exam-results'});
    const emoji=ep>=75?'🏆':ep>=60?'📚':'💪';
    wrap.appendChild(el('div',{cls:'end-emoji'},emoji));
    wrap.appendChild(el('div',{cls:'end-title'},'Resultado del examen'));
    wrap.appendChild(el('div',{cls:'end-pct'},`${ep}%`));
    wrap.appendChild(el('div',{cls:'end-msg'},ep>=75?'¡Aprobado! (≥75% requerido)':'No alcanzado el 75%. ¡Sigue practicando!'));
    const sr=el('div',{cls:'end-stats'});
    sr.appendChild(statChip('Correctas',  score,        'ok'));
    sr.appendChild(statChip('Incorrectas',total-score,  'err'));
    sr.appendChild(statChip('Total',      total,        'neutral'));
    wrap.appendChild(sr);
    wrap.appendChild(buildDetailedResults(results));
    wrap.appendChild(el('div',{cls:'end-btns'},
      el('button',{cls:'btn-secondary',onclick:()=>renderHome(false)},'⌂ Menú principal')));
    render(wrap);
  }

  // ─── EXAM HISTORY LIST ─────────────────────────────────────────────────────
  function renderExamHistory() {
    const history=Engine.getExamHistory();
    const wrap=el('div',{cls:'screen'});
    wrap.appendChild(el('h2',{cls:'screen-title'},'📋 Historial de exámenes'));
    wrap.appendChild(el('p', {cls:'screen-desc'},`${history.length} examen${history.length!==1?'es':''} guardado${history.length!==1?'s':''}`));

    if(history.length===0){
      wrap.appendChild(el('div',{cls:'empty-state'},'Aún no has completado ningún examen simulado.'));
    } else {
      const list=el('div',{cls:'history-list'});
      history.forEach(entry=>{
        const item=el('div',{cls:`history-item ${entry.pct>=75?'hist-pass':'hist-fail'}`,
          onclick:()=>renderExamHistoryDetail(entry.id)});
        const left=el('div',{cls:'hist-left'});
        left.appendChild(el('div',{cls:'hist-date'},fmtDate(entry.date)));
        left.appendChild(el('div',{cls:'hist-info'},
          `${entry.total} preguntas · ${fmtElapsed(entry.elapsed)}`));
        const right=el('div',{cls:'hist-right'});
        right.appendChild(el('div',{cls:'hist-pct'},`${entry.pct}%`));
        right.appendChild(el('div',{cls:'hist-score'},`${entry.score}/${entry.total}`));
        right.appendChild(el('div',{cls:'hist-badge'},entry.pct>=75?'✓ Aprobado':'✗ No aprobado'));
        item.appendChild(left); item.appendChild(right);
        list.appendChild(item);
      });
      wrap.appendChild(list);

      // Clear history button
      wrap.appendChild(el('button',{cls:'btn-link btn-link-danger',onclick:()=>{
        if(confirm('¿Borrar todo el historial de exámenes?')){
          Engine.clearExamHistory(); renderExamHistory();
        }
      }},'🗑 Borrar historial'));
    }

    wrap.appendChild(el('button',{cls:'btn-secondary',onclick:()=>renderHome(false)},'← Volver'));
    render(wrap);
  }

  // ─── EXAM HISTORY DETAIL ──────────────────────────────────────────────────
  function renderExamHistoryDetail(examId) {
    const entry=Engine.getExamHistoryEntry(examId);
    if(!entry){renderExamHistory();return;}

    const wrap=el('div',{cls:'screen exam-results'});
    const emoji=entry.pct>=75?'🏆':entry.pct>=60?'📚':'💪';
    wrap.appendChild(el('div',{cls:'end-emoji'},emoji));
    wrap.appendChild(el('div',{cls:'end-title'},fmtDate(entry.date)));
    wrap.appendChild(el('div',{cls:'end-pct'},`${entry.pct}%`));
    wrap.appendChild(el('div',{cls:'end-msg'},entry.pct>=75?'Aprobado (≥75%)':'No aprobado'));

    const sr=el('div',{cls:'end-stats'});
    sr.appendChild(statChip('Correctas',  entry.score,          'ok'));
    sr.appendChild(statChip('Incorrectas',entry.total-entry.score,'err'));
    sr.appendChild(statChip('Total',      entry.total,          'neutral'));
    if(entry.elapsed) sr.appendChild(statChip('Tiempo',fmtElapsed(entry.elapsed),'neutral'));
    wrap.appendChild(sr);

    wrap.appendChild(buildDetailedResults(entry.results));

    wrap.appendChild(el('div',{cls:'end-btns'},
      el('button',{cls:'btn-secondary',onclick:()=>renderExamHistory()},'← Historial')));
    render(wrap);
  }

  // shared results detail builder
  function buildDetailedResults(results) {
    const wrap=el('div');
    wrap.appendChild(el('div',{cls:'end-section-title'},'Correcciones detalladas:'));
    const details=el('div',{cls:'exam-details'});
    results.forEach(({q,userAns,correct})=>{
      if(!q)return;
      const item=el('div',{cls:`exam-detail-item ${correct?'detail-ok':'detail-err'}`});
      item.appendChild(el('div',{cls:'detail-header'},
        el('span',{cls:'detail-num'},    `#${q.id}`),
        el('span',{cls:'detail-verdict'},correct?'✓':'✗'),
        el('span',{cls:'detail-topic'},  q.topic)));
      item.appendChild(el('div',{cls:'detail-q'},q.q));
      if(!correct){
        item.appendChild(el('div',{cls:'detail-ans'},
          `Tu respuesta: ${userAns||'—'}  ·  Correcta: ${q.ans}`));
        item.appendChild(el('div',{cls:'detail-exp'},q.exp));
      }
      details.appendChild(item);
    });
    wrap.appendChild(details);
    return wrap;
  }

  // ─── EXPORT / IMPORT ──────────────────────────────────────────────────────
  function renderExportImport() {
    const wrap=el('div',{cls:'screen'});
    wrap.appendChild(el('h2',{cls:'screen-title'},'💾 Exportar / Importar'));
    wrap.appendChild(el('p', {cls:'screen-desc'},
      'Guarda tu progreso en un archivo para usarlo en otro dispositivo.'));

    // EXPORT section
    const expCard=el('div',{cls:'io-card'});
    expCard.appendChild(el('div',{cls:'io-card-title'},'📤 Exportar'));
    expCard.appendChild(el('div',{cls:'io-card-desc'},
      'Descarga un archivo JSON con tu progreso, errores e historial de exámenes.'));

    const stats=Engine.getOverallStats();
    const hist =Engine.getExamHistory();
    expCard.appendChild(el('div',{cls:'io-card-info'},
      `${stats.seen} preguntas estudiadas · ${hist.length} exámenes · ${stats.masteredCount} dominadas`));

    expCard.appendChild(el('button',{cls:'btn-primary',onclick:()=>{
      const json=Engine.exportData();
      const blob=new Blob([json],{type:'application/json'});
      const url =URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`csa_tutor_progreso_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }},'Descargar archivo de progreso'));
    wrap.appendChild(expCard);

    // IMPORT section
    const impCard=el('div',{cls:'io-card'});
    impCard.appendChild(el('div',{cls:'io-card-title'},'📥 Importar'));
    impCard.appendChild(el('div',{cls:'io-card-desc'},
      'Carga un archivo de progreso exportado previamente. Se fusionará con tu progreso actual.'));

    const fileInput=el('input',{type:'file',accept:'.json',cls:'file-input',id:'import-file'});
    const importLabel=el('label',{cls:'btn-secondary btn-file-label','for':'import-file'},
      '📂 Seleccionar archivo .json');
    const fileNameLabel=el('div',{cls:'file-name-label'},'Ningún archivo seleccionado');
    const importBtn=el('button',{cls:'btn-primary',disabled:'true',onclick:()=>{
      const file=fileInput.files[0]; if(!file)return;
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          Engine.importData(e.target.result);
          Engine.init();
          showImportMsg(impCard,'✓ Importado correctamente. ¡Progreso restaurado!',true);
          importBtn.disabled=true; fileNameLabel.textContent='Ningún archivo seleccionado';
          fileInput.value='';
        }catch(err){
          showImportMsg(impCard,'✗ Error al importar: '+err.message,false);
        }
      };
      reader.readAsText(file);
    }},'Importar progreso');
    importBtn.disabled=true;

    fileInput.addEventListener('change',()=>{
      if(fileInput.files[0]){
        fileNameLabel.textContent=fileInput.files[0].name;
        importBtn.disabled=false;
      }
    });

    const msgEl=el('div',{cls:'import-msg',id:'import-msg'});

    impCard.appendChild(fileInput);
    impCard.appendChild(importLabel);
    impCard.appendChild(fileNameLabel);
    impCard.appendChild(importBtn);
    impCard.appendChild(msgEl);
    wrap.appendChild(impCard);

    wrap.appendChild(el('button',{cls:'btn-secondary',onclick:()=>renderHome(false)},'← Volver'));
    render(wrap);
  }

  function showImportMsg(container, msg, ok) {
    const existing=container.querySelector('.import-msg');
    if(existing) existing.remove();
    const m=el('div',{cls:`import-msg ${ok?'import-ok':'import-err'}`},msg);
    container.appendChild(m);
  }

  // ─── helpers ──────────────────────────────────────────────────────────────
  function statChip(label, value, type) {
    const chip=el('div',{cls:`stat-chip stat-${type}`});
    chip.appendChild(el('div',{cls:'chip-value'},String(value)));
    chip.appendChild(el('div',{cls:'chip-label'},label));
    return chip;
  }

  return { mount };

})();
</script>
<script>document.addEventListener('DOMContentLoaded',function(){UI.mount(document.getElementById('app'));});</script>
</body>
</html>
