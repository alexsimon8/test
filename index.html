<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CSA Tutor — ServiceNow</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  background: #f0f2f5;
  color: #1a1a2e;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input  { font-family: inherit; }

/* ── App shell ────────────────────────────────────────────────── */
#app {
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  background: #ffffff;
  display: flex;
  flex-direction: column;
}
.screen {
  padding: 20px 16px 40px;
  flex: 1;
}

/* ── HOME ─────────────────────────────────────────────────────── */
.home { padding-top: 28px; }

.home-logo {
  font-size: 22px;
  font-weight: 700;
  color: #293462;
  text-align: center;
  letter-spacing: -0.3px;
}
.home-sub {
  font-size: 13px;
  color: #666;
  text-align: center;
  margin-top: 4px;
  margin-bottom: 18px;
}

.global-bar {
  height: 6px;
  background: #e8eaf0;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 4px;
}
.global-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4361ee, #7b2d8b);
  border-radius: 3px;
  transition: width 0.5s ease;
}
.global-bar-label {
  font-size: 12px;
  color: #888;
  text-align: center;
  margin-bottom: 18px;
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.menu-card {
  background: #f7f8fc;
  border: 1.5px solid #e0e4f0;
  border-radius: 14px;
  padding: 16px 12px 14px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  user-select: none;
}
.menu-card:hover { border-color: #4361ee; box-shadow: 0 2px 12px rgba(67,97,238,0.12); }
.menu-card:active { transform: scale(0.97); }
.menu-card.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
.card-icon { font-size: 22px; margin-bottom: 6px; }
.card-title { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
.card-desc  { font-size: 11px; color: #888; line-height: 1.4; }

.btn-continue {
  width: 100%;
  background: #4361ee;
  color: #fff;
  border-radius: 12px;
  padding: 13px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  transition: background 0.15s;
}
.btn-continue:hover { background: #3451d1; }

.home-stats {
  display: flex;
  justify-content: center;
  gap: 18px;
  font-size: 13px;
  color: #555;
  margin-bottom: 14px;
}
.home-stats span:first-child { color: #2d9e5f; font-weight: 600; }
.home-stats span:nth-child(2) { color: #e03e3e; font-weight: 600; }

.btn-link {
  display: block;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #aaa;
  padding: 6px;
  text-decoration: underline;
  background: none;
  border: none;
  cursor: pointer;
}
.btn-link:hover { color: #e03e3e; }

/* ── GOTO / EXAM SETUP ────────────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  color: #293462;
  margin-bottom: 6px;
}
.screen-desc {
  font-size: 13px;
  color: #777;
  margin-bottom: 20px;
}
.goto-input-wrap { margin-bottom: 14px; }
.goto-input, .exam-input {
  width: 100%;
  padding: 12px 14px;
  font-size: 20px;
  border: 2px solid #dce0f0;
  border-radius: 10px;
  outline: none;
  color: #1a1a2e;
  transition: border-color 0.15s;
  text-align: center;
}
.goto-input:focus, .exam-input:focus { border-color: #4361ee; }
.goto-input.error { border-color: #e03e3e; }
.exam-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.exam-label { font-size: 14px; color: #444; white-space: nowrap; }
.exam-input { width: 120px; font-size: 18px; text-align: center; }

/* ── SHARED BUTTONS ───────────────────────────────────────────── */
.btn-primary {
  display: block;
  width: 100%;
  background: #4361ee;
  color: #fff;
  border-radius: 12px;
  padding: 13px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  transition: background 0.15s, opacity 0.15s;
}
.btn-primary:hover:not(:disabled) { background: #3451d1; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  display: block;
  width: 100%;
  background: #f0f2f8;
  color: #444;
  border-radius: 12px;
  padding: 12px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 10px;
  transition: background 0.15s;
}
.btn-secondary:hover { background: #e4e8f5; }

/* ── QUESTION SCREEN ──────────────────────────────────────────── */
.question-screen { padding: 12px 14px 36px; }

.q-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.btn-home {
  font-size: 18px;
  padding: 4px 8px;
  color: #555;
  flex-shrink: 0;
}
.q-progress-wrap { flex: 1; }
.q-progress-bar {
  height: 5px;
  background: #e8eaf0;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 3px;
}
.q-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4361ee, #7b2d8b);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.q-progress-label { font-size: 11px; color: #999; text-align: right; }
.q-score-chip {
  font-size: 12px;
  font-weight: 600;
  background: #f0f2f8;
  border-radius: 20px;
  padding: 4px 10px;
  color: #444;
  white-space: nowrap;
  flex-shrink: 0;
}

.q-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.q-num   { font-size: 12px; font-weight: 700; color: #4361ee; }
.q-topic {
  font-size: 11px;
  background: #eef0fc;
  color: #4361ee;
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 500;
}
.q-multi {
  font-size: 11px;
  background: #fff4e0;
  color: #c97b00;
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 600;
}
.q-exam-badge {
  font-size: 11px;
  background: #ffeaea;
  color: #c0392b;
  border-radius: 20px;
  padding: 2px 8px;
  font-weight: 700;
}

.q-text {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.55;
  color: #1a1a2e;
  margin-bottom: 16px;
}

.q-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.q-opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 13px;
  border: 1.5px solid #dce0f0;
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  user-select: none;
}
.q-opt:hover { border-color: #4361ee; background: #f5f6ff; }
.q-opt.selected { border-color: #4361ee; background: #eef0fc; }
.q-opt.correct  { border-color: #2d9e5f; background: #eaf8f0; }
.q-opt.wrong    { border-color: #e03e3e; background: #fff0f0; }
.opt-letter {
  font-size: 12px;
  font-weight: 700;
  min-width: 20px;
  color: #888;
  padding-top: 1px;
  flex-shrink: 0;
}
.q-opt.selected .opt-letter { color: #4361ee; }
.q-opt.correct  .opt-letter { color: #2d9e5f; }
.q-opt.wrong    .opt-letter { color: #e03e3e; }
.opt-text { font-size: 13px; color: #1a1a2e; line-height: 1.45; }

.hints-wrap { margin-bottom: 10px; }
.hint-box {
  background: #fffbea;
  border: 1px solid #ffe08a;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: #856404;
  margin-bottom: 6px;
}

.feedback-wrap { margin-bottom: 12px; }
.feedback {
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.5;
}
.feedback-ok  { background: #eaf8f0; border: 1px solid #a8dfc0; }
.feedback-err { background: #fff0f0; border: 1px solid #f5b8b8; }
.fb-verdict {
  font-weight: 700;
  margin-bottom: 6px;
  font-size: 14px;
}
.feedback-ok  .fb-verdict { color: #1a6e41; }
.feedback-err .fb-verdict { color: #c0392b; }
.fb-exp { color: #444; border-top: 1px solid rgba(0,0,0,0.07); padding-top: 6px; margin-top: 4px; }

.q-actions { margin-bottom: 10px; }
.btn-hint {
  display: block;
  width: 100%;
  background: #fffbea;
  color: #856404;
  border: 1px solid #ffe08a;
  border-radius: 10px;
  padding: 10px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 8px;
  transition: background 0.12s;
}
.btn-hint:hover { background: #fff3c4; }

.q-nav {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  padding-top: 4px;
}
.btn-nav {
  background: #f0f2f8;
  color: #555;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.12s;
}
.btn-nav:hover { background: #dde2f5; }

/* ── SESSION END / EXAM RESULTS ───────────────────────────────── */
.end-screen, .exam-results { text-align: center; }

.end-emoji  { font-size: 44px; margin-bottom: 8px; margin-top: 10px; }
.end-title  { font-size: 13px; color: #888; margin-bottom: 4px; }
.end-pct    { font-size: 52px; font-weight: 800; color: #293462; margin-bottom: 4px; }
.end-msg    { font-size: 14px; color: #555; margin-bottom: 20px; }

.end-stats {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 22px;
}
.stat-chip {
  border-radius: 12px;
  padding: 12px 18px;
  min-width: 80px;
}
.stat-ok      { background: #eaf8f0; }
.stat-err     { background: #fff0f0; }
.stat-neutral { background: #f0f2f8; }
.chip-value {
  font-size: 22px;
  font-weight: 800;
  color: #1a1a2e;
  margin-bottom: 2px;
}
.stat-ok  .chip-value { color: #2d9e5f; }
.stat-err .chip-value { color: #e03e3e; }
.chip-label { font-size: 11px; color: #888; }

.end-section-title {
  font-size: 13px;
  font-weight: 600;
  color: #444;
  text-align: left;
  margin-bottom: 8px;
  margin-top: 4px;
}
.topic-list { margin-bottom: 16px; }
.topic-item {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid #f0f2f5;
  font-size: 13px;
  color: #444;
  text-align: left;
}
.topic-err { color: #e03e3e; font-weight: 600; font-size: 12px; }

.recs {
  text-align: left;
  padding-left: 18px;
  margin-bottom: 22px;
  color: #555;
  font-size: 13px;
  line-height: 1.9;
}

.end-btns { display: flex; flex-direction: column; gap: 8px; }

/* ── EXAM DETAIL ──────────────────────────────────────────────── */
.exam-details { margin-bottom: 24px; }
.exam-detail-item {
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  text-align: left;
}
.detail-ok  { background: #f0fdf6; border: 1px solid #b8e8cc; }
.detail-err { background: #fff5f5; border: 1px solid #f5b8b8; }
.detail-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.detail-num     { font-size: 12px; font-weight: 700; color: #4361ee; }
.detail-verdict { font-weight: 800; font-size: 14px; }
.detail-ok  .detail-verdict { color: #2d9e5f; }
.detail-err .detail-verdict { color: #e03e3e; }
.detail-topic {
  font-size: 11px;
  color: #888;
  background: #f0f2f8;
  border-radius: 20px;
  padding: 1px 7px;
}
.detail-q   { font-size: 12px; color: #333; margin-bottom: 5px; line-height: 1.4; }
.detail-ans { font-size: 12px; font-weight: 600; color: #c0392b; margin-bottom: 4px; }
.detail-exp { font-size: 11px; color: #666; line-height: 1.5; }

/* ── Responsive tweaks ────────────────────────────────────────── */
@media (max-width: 400px) {
  .menu-grid { grid-template-columns: 1fr; }
  .end-pct   { font-size: 42px; }
  .q-text    { font-size: 14px; }
}
</style>
</head>
<body>
<div id="app"></div>

<!-- Data files -->
<script src="data_q001_q100.js"></script>
<script src="data_q101_q200.js"></script>
<script src="data_q201_q300.js"></script>
<script src="data_q301_q408.js"></script>

<!-- Logic & UI -->
<script src="engine.js"></script>
<script src="ui.js"></script>

<!-- Boot -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    UI.mount(document.getElementById('app'));
  });
</script>
</body>
</html>
